      <rect x="170" y="325" width="125" height="92" fill="url(#dots)"/><rect x="315" y="325" width="125" height="92" fill="url(#dots)"/><rect x="460" y="325" width="110" height="92" fill="url(#dots)"/>
      <rect x="170" y="442" width="125" height="86" fill="url(#dots)"/><rect x="315" y="442" width="125" height="86" fill="url(#dots)"/><rect x="460" y="442" width="110" height="86" fill="url(#dots)"/>
      <rect x="42" y="150" width="80" height="110" fill="url(#dots)"/><rect x="42" y="285" width="80" height="110" fill="url(#dots)"/><rect x="42" y="420" width="80" height="90" fill="url(#dots)"/>
