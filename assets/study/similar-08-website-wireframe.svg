<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-label="Original graphic study: website layout wireframe">
  <rect width="1400" height="900" fill="#F7E8C9"/>
  <g style="font-family: Manrope, Inter, Helvetica, Arial, sans-serif;" fill="#24171E">
