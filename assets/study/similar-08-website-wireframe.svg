    <text x="72" y="230" font-size="78" font-weight="300" letter-spacing="-2">A retro-modern</text>
    <text x="72" y="315" font-size="78" font-weight="300" letter-spacing="-2">oceanic research</text>
    <text x="72" y="400" font-size="78" font-weight="300" letter-spacing="-2">terminal.</text>
