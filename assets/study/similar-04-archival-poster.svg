  <rect x="55" y="55" width="790" height="1090" rx="24" fill="#F7E8C9" opacity="0.75" stroke="#D7C6A2"/>
  <g transform="translate(85 280) rotate(-12)">
    <path d="M0 210 L280 75 L420 150 L125 315 Z" fill="#B45636" opacity="0.86"/>
    <path d="M70 360 L360 220 L512 300 L220 452 Z" fill="#D27A3F" opacity="0.86"/>
    <circle cx="520" cy="380" r="60" fill="none" stroke="#B45636" stroke-width="32"/>
  </g>
  <g transform="translate(320 120) rotate(-13)" style="font-family: Manrope, Inter, Helvetica, Arial, sans-serif;" fill="#24171E">
