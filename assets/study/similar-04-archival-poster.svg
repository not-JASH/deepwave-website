<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-label="Original graphic study: distressed archival science poster">
  <defs>
    <filter id="paperNoise"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="4" seed="12"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.14"/></feComponentTransfer></filter>
    <pattern id="scratch" width="140" height="140" patternUnits="userSpaceOnUse"><path d="M10 90 C40 70, 80 110, 130 42" stroke="#111" stroke-width="4" fill="none" opacity="0.12"/><circle cx="80" cy="30" r="3" fill="#111" opacity="0.16"/></pattern>
  </defs>
  <rect width="900" height="1200" fill="#F2E6CA"/>
