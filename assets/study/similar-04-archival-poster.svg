    <text x="0" y="82" font-size="82" font-weight="800">Archive</text>
    <text x="0" y="145" font-size="34" font-weight="800">The first thing you should</text>
    <text x="0" y="185" font-size="34" font-weight="800">know about signal.</text>
    <text x="0" y="255" font-size="25" font-family="Georgia, serif">Discover the pulse of applied</text>
    <text x="0" y="292" font-size="25" font-family="Georgia, serif">research, field systems, and deep</text>
    <text x="0" y="329" font-size="25" font-family="Georgia, serif">ocean intelligence. All reports</text>
    <text x="0" y="366" font-size="25" font-family="Georgia, serif">are accessioned and verified.</text>
  </g>
  <g transform="translate(125 815)" style="font-family: Manrope, Inter, Helvetica, Arial, sans-serif;">
    <rect x="0" y="0" width="650" height="210" fill="#F5EBD4" opacity="0.72"/>
    <g opacity="0.35">
      <rect x="25" y="55" width="120" height="90" fill="#829083"/><rect x="170" y="35" width="95" height="120" fill="#bfa36d"/>
      <rect x="300" y="65" width="180" height="70" fill="#879a96"/><circle cx="555" cy="105" r="55" fill="#c17954"/>
    </g>
    <text x="25" y="188" font-size="16" letter-spacing="2" fill="#7B7162">ARCHIVAL POSTER STUDY · GRAIN + STAMP + OFF-AXIS HEADLINE</text>
  </g>
  <rect width="900" height="1200" fill="url(#scratch)"/>
  <g fill="#111" opacity="0.75">
    <circle cx="130" cy="925" r="8"/><circle cx="146" cy="940" r="4"/><circle cx="690" cy="620" r="8"/><circle cx="705" cy="598" r="4"/>
